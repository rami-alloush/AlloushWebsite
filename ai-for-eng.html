<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI for Engineering - Dr. Rami Alloush</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      if (typeof tailwind !== "undefined")
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                "energy-blue": "#38bdf8",
                "energy-gold": "#fbbf24",
                "energy-800": "#1e293b",
                "energy-900": "#0f172a",
              },
            },
          },
        };
    </script>
    <style>
      body {
        font-family: "Manrope", system-ui, sans-serif;
        background-color: #0f172a;
        color: #e2e8f0;
      }

      .glass-panel {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .gradient-text {
        background: linear-gradient(to right, #38bdf8, #fbbf24);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
    </style>
  </head>

  <body class="antialiased selection:bg-energy-blue selection:text-energy-900">
    <!-- Navigation -->
    <nav
      class="fixed w-full z-50 glass-panel border-b border-white/10"
      id="navbar"
    >
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
          <a
            href="index.html"
            class="flex-shrink-0 font-bold text-xl tracking-tight text-white hover:text-energy-blue transition-colors"
          >
            Dr. Rami <span class="text-energy-blue">Alloush</span>
          </a>

          <div class="hidden md:block">
            <a
              href="index.html"
              class="bg-energy-blue/10 hover:bg-energy-blue/20 text-energy-blue border border-energy-blue/50 px-4 py-2 rounded-full text-sm font-medium transition-all hover:shadow-[0_0_15px_rgba(56,189,248,0.3)]"
            >
              Back to Home
            </a>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <section
      class="relative min-h-screen flex flex-col items-center justify-center overflow-hidden pt-24 pb-12 px-4"
    >
      <div
        class="absolute inset-0 bg-gradient-to-b from-energy-900/90 via-energy-900/80 to-energy-900"
      ></div>

      <div class="relative z-10 w-full max-w-7xl mx-auto">
        <h1
          class="text-4xl md:text-5xl font-extrabold text-white tracking-tight mb-8 text-center"
        >
          <span class="gradient-text">AI for Engineering</span>
        </h1>

        <p class="text-center text-gray-300 mb-12 text-lg max-w-3xl mx-auto">
          Exploring the intersection of artificial intelligence and engineering
          disciplines
        </p>

        <!-- Feedback Form -->
        <div class="w-full flex justify-center">
          <div class="glass-panel rounded-2xl p-4 w-full max-w-3xl">
            <iframe
              id="feedback-form"
              src="https://docs.google.com/forms/d/e/1FAIpQLSd4NA0DLrewBrrRzEhq5L5AbkvOEnE9dBVs6ISjUQ-_w6aYpw/viewform?embedded=true"
              width="100%"
              frameborder="0"
              marginheight="0"
              marginwidth="0"
              scrolling="no"
              style="
                border: none;
                margin: 0 auto;
                display: block;
                overflow: hidden;
              "
              >Loading…</iframe
            >
          </div>
        </div>
        <script>
          (function () {
            var iframe = document.getElementById("feedback-form");
            var BASE_W = 640;
            var BASE_H = 1959;
            var CONFIRM_H = 400;
            var loadCount = 0;
            var submitted = false;

            function resize() {
              if (submitted) return;
              var w = iframe.offsetWidth;
              var h = Math.ceil(BASE_H * (BASE_W / Math.max(w, 1)));
              h = Math.max(h, BASE_H);
              iframe.style.height = h + "px";
            }

            iframe.addEventListener("load", function () {
              loadCount++;
              if (loadCount > 1) {
                submitted = true;
                iframe.style.height = CONFIRM_H + "px";
                iframe.scrollIntoView({ behavior: "smooth", block: "center" });
              } else {
                resize();
              }
            });

            new ResizeObserver(resize).observe(iframe);
            resize();
          })();
        </script>
      </div>
    </section>
  </body>
</html>
