name: Deploy to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to cPanel via SSH
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject cache version into sw.js
        run: |
          COMMIT_SHA=$(git rev-parse --short HEAD)
          sed -i "s/const CACHE_VERSION = '[^']*'/const CACHE_VERSION = '$COMMIT_SHA'/" sw.js
          echo "Cache version set to: $COMMIT_SHA"

      - name: Deploy to cPanel
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USERNAME }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          passphrase: ${{ secrets.CPANEL_SSH_PASSPHRASE }}
          port: ${{ secrets.CPANEL_PORT || 22 }}
          script: |
            cd ~/repositories/AlloushWebsite
            git pull origin main
            # Inject commit SHA as cache version in sw.js before copying
            COMMIT_SHA=$(git rev-parse --short HEAD)
            sed -i "s/const CACHE_VERSION = '[^']*'/const CACHE_VERSION = '$COMMIT_SHA'/" sw.js
            export DEPLOYPATH=/home/ramiallo/public_html/
            /bin/cp -R * $DEPLOYPATH
            echo "Deployment completed successfully! Cache version: $COMMIT_SHA"
